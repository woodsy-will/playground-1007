# P1 — Burn Severity & Recovery Configuration

data:
  fire_perimeters: "data/raw/fire_perimeters/"
  imagery_dir: "data/raw/imagery/"
  management_units: "data/raw/management_units/"
  output_dir: "data/processed/"

acquisition:
  source: "copernicus"       # or "usgs_earthexplorer"
  cloud_cover_max: 20        # percent
  seasonal_window: [6, 10]   # month range for compositing

processing:
  crs: "EPSG:3310"
  severity_thresholds:
    unburned: [-0.1, 0.1]
    low: [0.1, 0.27]
    moderate_low: [0.27, 0.44]
    moderate_high: [0.44, 0.66]
    high: [0.66, 1.3]
  recovery_index: "NDVI"     # or "EVI"
  recovery_model: "exponential"
  years_post_fire: 5
